<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes, viewport-fit=cover">
<title>Preflop Chart Viewer</title>
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<meta name="googlebot" content="noindex, nofollow, noimageindex">
<link rel="manifest" href="./manifest.webmanifest">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="./icon.svg">
<link rel="icon" href="./icon.svg" type="image/svg+xml">
<style>
:root{
  --red:#E8503A;
  --red-dark:#C63E29;
  --bar:#4A4543;
  --bar-hover:#5A5451;
  --ink:#33302E;
  --rule:#E2DEDA;
  --serif:Georgia,"Times New Roman",Times,serif;
  --sans:"Helvetica Neue",Helvetica,Arial,system-ui,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0}
body{
  background:#fff;color:var(--ink);font-family:var(--sans);
  padding:0 0 60px;
  -webkit-text-size-adjust:100%;
}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
:focus-visible{outline:2px solid var(--red);outline-offset:2px}

.wrap{max-width:1180px;margin:0 auto;padding:0 24px}

/* ---------- masthead ---------- */
.mast{padding:38px 0 6px;display:flex;align-items:center;gap:26px}
.mast .rule{flex:1;height:3px;background:var(--red)}
.mast h1{
  margin:0;font-family:var(--serif);font-weight:400;
  font-size:34px;color:var(--red);white-space:nowrap;letter-spacing:.01em;
}
.sub{text-align:center;color:#8B8480;font-size:13px;margin:12px 0 0}

/* ---------- legend ---------- */
.legend{
  display:flex;flex-wrap:wrap;justify-content:center;gap:10px 26px;
  padding:26px 0 34px;
}
.legend span{display:flex;align-items:center;gap:8px;font-size:13px;color:#5E5854}
.legend i{width:15px;height:15px;border-radius:3px;display:block;border:1px solid rgba(0,0,0,.15)}

/* ---------- accordion ---------- */
.cols{display:grid;grid-template-columns:1fr 1fr;gap:0 34px;align-items:start}
.col{display:flex;flex-direction:column}

.sec{margin:0 0 14px}
.secbtn{
  width:100%;display:flex;align-items:center;gap:14px;
  padding:19px 22px;background:var(--bar);color:#F4F1EF;
  font-size:19px;font-weight:700;text-align:left;letter-spacing:.01em;
  transition:background .15s ease;
}
.secbtn:hover{background:var(--bar-hover)}
.secbtn .arw{
  font-size:13px;line-height:1;color:#C7C1BE;
  transition:transform .2s ease;flex:none;width:14px;
}
.sec.open .secbtn .arw{transform:rotate(90deg)}

.panel{display:none;border:1px solid var(--rule);border-top:0;padding:8px 0 18px}
.sec.open .panel{display:block}

.grp{margin:0}
.grph{
  font-size:16px;color:var(--red);font-weight:400;
  padding:12px 0 4px 30px;position:relative;margin:0;
}
.grph::before{
  content:"";position:absolute;left:16px;top:20px;
  width:7px;height:7px;background:var(--red);
}
.grp ul{list-style:none;margin:0;padding:0}
.grp li{position:relative}
.grp li::before{
  content:"";position:absolute;left:38px;top:16px;
  width:6px;height:6px;background:var(--red);
}
.grp li button{
  display:block;width:100%;text-align:left;
  padding:7px 20px 7px 54px;
  color:var(--red);font-size:16px;
  transition:background .12s ease,color .12s ease;
}
.grp li button:hover{background:#FCF2F0;color:var(--red-dark)}

.flat{list-style:none;margin:0;padding:6px 0}
.flat li{position:relative}
.flat li::before{
  content:"";position:absolute;left:20px;top:16px;
  width:7px;height:7px;background:var(--red);
}
.flat li button{
  display:block;width:100%;text-align:left;
  padding:7px 20px 7px 38px;
  color:var(--red);font-size:16px;
  transition:background .12s ease,color .12s ease;
}
.flat li button:hover{background:#FCF2F0;color:var(--red-dark)}

/* ---------- offline ---------- */
.tools{text-align:center;padding:44px 0 0}
.tools button{
  border:1px solid var(--rule);border-radius:4px;
  padding:11px 22px;font-size:13px;color:#6E6864;
  transition:border-color .15s ease,color .15s ease;
}
.tools button:hover{border-color:#C9C3BE;color:var(--ink)}
.tools button:disabled{cursor:default}

/* ---------- lightbox ---------- */
.lb{
  position:fixed;inset:0;z-index:60;display:none;
  background:rgba(26,23,22,.94);
  flex-direction:column;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}
.lb.on{display:flex}
.lbhead{display:flex;align-items:center;gap:16px;padding:16px 20px;color:#F4F1EF;flex:none}
.lbhead h2{margin:0;font-size:17px;font-weight:600;flex:1;min-width:0}
.lbhead .idx{font-size:13px;color:#A69F9B;font-variant-numeric:tabular-nums}
.lbhead button{font-size:26px;line-height:1;color:#A69F9B;padding:2px 8px}
.lbhead button:hover{color:#fff}
.lbbody{flex:1;min-height:0;display:grid;place-items:center;padding:0 16px 8px}
.lbbody img{max-width:100%;max-height:100%;display:block;border-radius:6px;transition:opacity .16s ease}
.lbbody img.load{opacity:.3}
.lbnav{display:flex;justify-content:center;align-items:center;gap:12px;padding:12px 20px 20px;flex:none}
.lbnav button{padding:9px 20px;border:1px solid #4A4543;border-radius:5px;color:#D8D3D0;font-size:14px}
.lbnav button:hover:not(:disabled){background:#332F2D;color:#fff}
.lbnav button:disabled{opacity:.35;cursor:default}
.lberr{color:#E8A79A;font-size:14px;text-align:center;line-height:1.6;max-width:420px}

/* ---------- passcode gate ---------- */
.locked .wrap,.locked .lb{display:none!important}
.gate{
  position:fixed;inset:0;z-index:80;display:none;
  background:#fff;place-items:center;padding:24px;
}
.locked .gate{display:grid}
.gatebox{width:100%;max-width:330px;text-align:center}
.gatebox h2{
  margin:0 0 6px;font-family:var(--serif);font-weight:400;
  font-size:27px;color:var(--red);
}
.gatebox p{margin:0 0 22px;font-size:13px;color:#8B8480}
.gatebox input{
  width:100%;padding:13px 15px;font-size:16px;font-family:inherit;
  border:1px solid var(--rule);border-radius:4px;color:var(--ink);
  background:#fff;text-align:center;letter-spacing:.06em;
}
.gatebox input:focus{outline:none;border-color:var(--red)}
.gatebox button{
  width:100%;margin-top:10px;padding:13px;border-radius:4px;
  background:var(--red);color:#fff;font-size:15px;font-weight:600;
  transition:background .15s ease;
}
.gatebox button:hover{background:var(--red-dark)}
.gatemsg{min-height:20px;margin-top:14px!important;color:var(--red)!important}


@media (max-width:960px){
  .wrap{padding:0 18px}
  .cols{gap:0 20px}
  .secbtn{padding:17px 16px;font-size:17px;gap:11px}
  .grp li button,.flat li button{font-size:15px}
  .grph{font-size:15px}
}
@media (max-width:640px){
  .cols{grid-template-columns:1fr;gap:0}
  .wrap{padding:0 16px}
  .mast{padding:26px 0 4px;gap:14px}
  .mast h1{font-size:26px}
  .legend{gap:8px 18px;padding:20px 0 26px}
}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body class="locked">

<div class="gate" id="gate">
  <div class="gatebox">
    <h2>Preflop Charts</h2>
    <p>Enter the passcode to continue.</p>
    <input id="pw" type="password" inputmode="text" autocomplete="current-password"
           autocapitalize="off" autocorrect="off" spellcheck="false" aria-label="Passcode">
    <button id="go">Unlock</button>
    <p class="gatemsg" id="gatemsg"></p>
  </div>
</div>

<div class="wrap">
  <div class="mast">
    <span class="rule"></span>
    <h1>100 Big Blinds</h1>
    <span class="rule"></span>
  </div>
  <p class="sub">6-max cash game preflop ranges</p>

  <div class="legend">
    <span><i style="background:#F5761A"></i>Raise</span>
    <span><i style="background:#5CD65C"></i>Call / Check</span>
    <span><i style="background:#8E24C9"></i>All-In</span>
    <span><i style="background:#2E9BD6"></i>Fold</span>
    <span><i style="background:#26282C"></i>Not In Range</span>
  </div>

  <div class="cols" id="cols"></div>

  <div class="tools">
    <button id="dl">Save all charts for offline use</button>
  </div>
</div>

<div class="lb" id="lb">
  <div class="lbhead">
    <h2 id="lbtitle"></h2>
    <span class="idx" id="lbidx"></span>
    <button id="lbclose" aria-label="Close">&times;</button>
  </div>
  <div class="lbbody">
    <img id="lbimg" alt="">
    <p class="lberr" id="lberr" hidden></p>
  </div>
  <div class="lbnav">
    <button id="lbprev">&larr; Previous</button>
    <button id="lbnext">Next &rarr;</button>
  </div>
</div>

<script>
/* ==================================================================
   PASSCODE GATE

   This keeps casual visitors out. It is NOT real security — see the
   notes in the chat. To change the passcode, open your browser
   console on any page and run:

     crypto.subtle.digest("SHA-256", new TextEncoder().encode("yourword"))
       .then(b => console.log([...new Uint8Array(b)]
         .map(x => x.toString(16).padStart(2,"0")).join("")));

   then paste the result below. Current passcode: changeme
================================================================== */
const PASS_HASH = "057ba03d6c44104863dc7361fe4578965d1887360f90a0895882e58a6248fc86";

const gate = document.getElementById("gate"),
      pw   = document.getElementById("pw"),
      gmsg = document.getElementById("gatemsg");

const remember = {
  get(){ try { return sessionStorage.getItem("unlocked") === "1"; } catch(e){ return false; } },
  set(){ try { sessionStorage.setItem("unlocked","1"); } catch(e){} }
};

async function sha256(s){
  const b = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(s));
  return [...new Uint8Array(b)].map(x => x.toString(16).padStart(2,"0")).join("");
}

function unlock(){
  document.body.classList.remove("locked");
  remember.set();
}

async function tryPass(){
  const v = pw.value.trim();
  if (!v) return;
  let ok = false;
  try { ok = (await sha256(v)) === PASS_HASH; } catch(e){ ok = false; }
  if (ok){ unlock(); }
  else {
    gmsg.textContent = "That passcode didn't work.";
    pw.value = "";
    pw.focus();
  }
}

document.getElementById("go").onclick = tryPass;
pw.addEventListener("keydown", e => { if (e.key === "Enter") tryPass(); });

if (remember.get()) unlock();
else setTimeout(() => pw.focus(), 60);

/* ==================================================================
   DATA — the four maps below are the whole configuration.
   To add a chart: drop the PNG in this folder and add the position
   to the matching map. Filenames are derived automatically.
================================================================== */
const NAME  = {UTG:"UTG", MP:"MP", CO:"CO", BU:"BTN", SB:"SB", BB:"BB"};
const ORDER = ["UTG","MP","CO","BU","SB","BB"];

const RFI = ["UTG","MP","CO","BU","SB"];

/* hero : villains who opened before them */
const VS_RFI = {
  MP:["UTG"], CO:["UTG","MP"], BU:["UTG","MP","CO"],
  SB:["UTG","MP","CO","BU"], BB:["UTG","MP","CO","BU","SB"]
};
/* hero opened : villains who 3-bet them */
const VS_3BET = {
  UTG:["MP","CO","BU","SB","BB"], MP:["CO","BU","SB","BB"],
  CO:["BU","SB","BB"], BU:["SB","BB"], SB:["BB"]
};
/* hero 3-bet : villains who 4-bet them */
const VS_4BET = {
  MP:["UTG"], CO:["UTG","MP"], BU:["UTG","MP","CO"],
  SB:["UTG","MP","CO","BU"], BB:["UTG","MP","CO","BU","SB"]
};

const REMOTE = "https://raw.githubusercontent.com/brvideoupload-sudo/cgcharts/main/";

/* invert a hero->villains map into villain->heroes */
function byVillain(map){
  const out = {};
  ORDER.forEach(v => {
    const heroes = ORDER.filter(h => (map[h] || []).includes(v));
    if (heroes.length) out[v] = heroes;
  });
  return out;
}

/* ==================================================================
   SECTIONS
================================================================== */
const SECTIONS = [
  {
    id:"rfi", label:"RFI", col:0,
    flat: RFI.map(p => ({
      file:  p + "_open.png",
      label: NAME[p] + " RFI",
      title: NAME[p] + " raise first in"
    }))
  },
  {
    id:"vsrfi", label:"vs RFI", col:0,
    groups: Object.entries(byVillain(VS_RFI)).map(([v, heroes]) => ({
      head: "Vs " + NAME[v],
      items: heroes.map(h => ({
        file:  h + "_VS_" + v + "_OPEN.png",
        label: NAME[h] + " vs " + NAME[v],
        title: NAME[h] + " vs " + NAME[v] + " RFI"
      }))
    }))
  },
  {
    id:"rfivs3bet", label:"RFI vs 3-Bet", col:1,
    groups: Object.keys(VS_3BET).map(h => ({
      head: NAME[h],
      items: VS_3BET[h].map(v => ({
        file:  h + "_VS_" + v + "_3BET.png",
        label: "Vs " + NAME[v],
        title: NAME[h] + " RFI vs " + NAME[v] + " 3-bet"
      }))
    }))
  },
  {
    id:"vs4bet", label:"vs 4-Bet", col:1,
    groups: Object.entries(byVillain(VS_4BET)).map(([v, heroes]) => ({
      head: "Vs " + NAME[v] + " 4-Bet",
      items: heroes.map(h => ({
        file:  h + "_VS_" + v + "_4BET.png",
        label: NAME[h],
        title: NAME[h] + " vs " + NAME[v] + " 4-bet"
      }))
    }))
  }
];

/* flat index, so Previous/Next walks the section you opened from */
const CHARTS = [];
SECTIONS.forEach(s => {
  s.start = CHARTS.length;
  (s.flat   || []).forEach(it => CHARTS.push(it));
  (s.groups || []).forEach(g => g.items.forEach(it => CHARTS.push(it)));
  s.end = CHARTS.length;
});

/* ==================================================================
   BUILD THE PAGE
================================================================== */
const cols = document.getElementById("cols");
const colEl = [document.createElement("div"), document.createElement("div")];
colEl.forEach(c => { c.className = "col"; cols.appendChild(c); });

SECTIONS.forEach(s => {
  const sec = document.createElement("section");
  sec.className = "sec";

  const btn = document.createElement("button");
  btn.className = "secbtn";
  btn.setAttribute("aria-expanded", "false");
  btn.innerHTML = '<span class="arw">&#9654;</span><span>' + s.label + '</span>';
  btn.onclick = () => {
    const open = sec.classList.toggle("open");
    btn.setAttribute("aria-expanded", open ? "true" : "false");
  };
  sec.appendChild(btn);

  const panel = document.createElement("div");
  panel.className = "panel";

  if (s.flat){
    const ul = document.createElement("ul");
    ul.className = "flat";
    s.flat.forEach(it => ul.appendChild(item(it, s)));
    panel.appendChild(ul);
  }
  (s.groups || []).forEach(g => {
    const wrap = document.createElement("div");
    wrap.className = "grp";
    const h = document.createElement("p");
    h.className = "grph";
    h.textContent = g.head;
    wrap.appendChild(h);
    const ul = document.createElement("ul");
    g.items.forEach(it => ul.appendChild(item(it, s)));
    wrap.appendChild(ul);
    panel.appendChild(wrap);
  });

  sec.appendChild(panel);
  colEl[s.col].appendChild(sec);
});

function item(it, sec){
  const li = document.createElement("li");
  const b = document.createElement("button");
  b.textContent = it.label;
  b.onclick = () => show(CHARTS.indexOf(it), sec);
  li.appendChild(b);
  return li;
}

/* ==================================================================
   LIGHTBOX
================================================================== */
const lb      = document.getElementById("lb"),
      lbimg   = document.getElementById("lbimg"),
      lbtitle = document.getElementById("lbtitle"),
      lbidx   = document.getElementById("lbidx"),
      lberr   = document.getElementById("lberr"),
      lbprev  = document.getElementById("lbprev"),
      lbnext  = document.getElementById("lbnext");

let idx = -1, range = [0, 0];

function show(i, sec){
  if (i < 0) return;
  if (sec) range = [sec.start, sec.end];
  idx = i;
  const it = CHARTS[i];

  lbtitle.textContent = it.title;
  lbidx.textContent   = (i - range[0] + 1) + " / " + (range[1] - range[0]);
  lberr.hidden = true;
  lbimg.hidden = false;
  lbimg.classList.add("load");
  lbimg.alt = it.title;
  lbimg.dataset.retry = "0";
  lbimg.src = "./" + it.file;

  lbprev.disabled = i <= range[0];
  lbnext.disabled = i >= range[1] - 1;

  lb.classList.add("on");
  document.body.style.overflow = "hidden";
  preload(i);
}

lbimg.onload = () => lbimg.classList.remove("load");
lbimg.onerror = () => {
  /* relative path fails before deploy — fall back to the repo */
  if (lbimg.dataset.retry === "0"){
    lbimg.dataset.retry = "1";
    lbimg.src = REMOTE + CHARTS[idx].file;
  } else {
    lbimg.classList.remove("load");
    lbimg.hidden = true;
    lberr.hidden = false;
    lberr.textContent = "Couldn't load " + CHARTS[idx].file +
      ". Check that the file is in the repo under exactly that name.";
  }
};

function preload(i){
  [-1, 1].forEach(d => {
    const j = i + d, it = CHARTS[j];
    if (!it || j < range[0] || j >= range[1]) return;
    const im = new Image();
    im.onerror = () => { im.onerror = null; im.src = REMOTE + it.file; };
    im.src = "./" + it.file;
  });
}

const step = d => { const n = idx + d; if (n >= range[0] && n < range[1]) show(n); };
lbprev.onclick = () => step(-1);
lbnext.onclick = () => step(1);

function close(){
  lb.classList.remove("on");
  document.body.style.overflow = "";
}
document.getElementById("lbclose").onclick = close;

/* A click anywhere closes — except on the Previous/Next controls,
   and except straight after a swipe (which also fires a click). */
let justSwiped = false;
lb.addEventListener("click", e => {
  if (justSwiped) return;
  if (e.target.closest(".lbnav")) return;
  close();
});

document.addEventListener("keydown", e => {
  if (!lb.classList.contains("on")) return;
  if (e.key === "Escape")     close();
  if (e.key === "ArrowLeft")  step(-1);
  if (e.key === "ArrowRight") step(1);
});

/* swipe between charts */
let sx = 0, sy = 0, track = false;
lb.addEventListener("touchstart", e => {
  if (e.touches.length !== 1){ track = false; return; }
  track = true; sx = e.touches[0].clientX; sy = e.touches[0].clientY;
}, {passive:true});
lb.addEventListener("touchend", e => {
  if (!track) return;
  track = false;
  const t = e.changedTouches[0], dx = t.clientX - sx, dy = t.clientY - sy;
  if (Math.abs(dx) > 55 && Math.abs(dx) > Math.abs(dy) * 1.6){
    justSwiped = true;
    setTimeout(() => { justSwiped = false; }, 400);
    step(dx < 0 ? 1 : -1);
  }
}, {passive:true});

/* ==================================================================
   OFFLINE
================================================================== */
if ("serviceWorker" in navigator){
  window.addEventListener("load", () => navigator.serviceWorker.register("./sw.js").catch(()=>{}));
}
const dl = document.getElementById("dl");
dl.onclick = async () => {
  if (!("caches" in window)){ dl.textContent = "Offline storage isn't available in this browser"; return; }
  dl.disabled = true;
  try {
    const c = await caches.open("charts-v1");
    let done = 0;
    for (const it of CHARTS){
      try { await c.add("./" + it.file); } catch(e){}
      dl.textContent = "Saving \u2026 " + (++done) + " / " + CHARTS.length;
    }
    dl.textContent = "Saved \u2014 the charts now work without signal";
  } catch(e){
    dl.textContent = "Couldn't save. Tap to try again.";
    dl.disabled = false;
  }
};
</script>
</body>
</html>
